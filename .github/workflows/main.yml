name: Docker Images CI

on:
  schedule:
  - cron: "0 4 * * 1-5"
  workflow_dispatch:


jobs:
  build-tour-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
         config:
         - {
            ros2_distro: "jazzy",
            base_image_repo: "ubuntu",
            base_image_tag: "24.04",
            image_name_base: "ste93/convince:ubuntu_24.04_qt_6.8.3",
            dockerfile: "Dockerfile.qt"
         }
         - {
            ros2_distro: "jazzy",
            base_image_repo: "ghcr.io/hsp-iit/r1images",
            base_image_tag: "tourCore2_ubuntu_24.04_qt_6.8.3_jazzy",
            image_name_base: "ste93/convince:tour_ubuntu_24.04_qt_6.8.3_jazzy_bt",
            dockerfile: "Dockerfile.bt"
         }         
         - {
            ros2_distro: "jazzy",
            base_image_repo: "ghcr.io/hsp-iit/r1images",
            base_image_tag: "tourSim2_ubuntu_24.04_qt_6.8.3_jazzy",
            image_name_base: "ste93/convince:tour_sim_ubuntu_24.04_qt_6.8.3_jazzy_bt",
            dockerfile: "Dockerfile.bt"
         }
         - {
            ros2_distro: "jazzy",
            base_image_repo: "ghcr.io/hsp-iit/r1images",
            base_image_tag: "tourCore2_ubuntu_24.04_qt_6.8.3_jazzy",
            image_name_base: "ste93/convince:tour_ubuntu_24.04_qt_6.8.3_jazzy_verification",
            dockerfile: "Dockerfile.verification"
         }
    steps:
    - name: Info
      run: |
       echo "Event type: ${{github.event_name}}"
    - name: Change docker to experimental mode
      run: |
       sudo rm -rf /etc/docker/daemon.json
       echo '{"experimental": true}' | sudo tee -a /etc/docker/daemon.json
    - name: Restart docker daemon
      run: sudo systemctl restart docker
    - uses: actions/checkout@v4
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ste93
        password: ${{ secrets.STE93_DOCKERHUB_TOKEN }}
    - name: Set up QEMU (for multi-arch builds)
      uses: docker/setup-qemu-action@v2
      with:
        platforms: linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push multi-arch Docker image
      working-directory: docker
      run: |
       if [ ${{ github.event_name }} == 'schedule' ]; then
          if [ "${{ matrix.config.base_image_repo }}" == "ubuntu" ]; then
             TAG_SUFFIX=""
             BASE_TAG_SUFFIX=""
          else
             TAG_SUFFIX="_devel"
             BASE_TAG_SUFFIX="_devel"
          fi
          echo "Building and pushing development tour core image for amd64 and arm64"
          docker buildx build --platform linux/amd64,linux/arm64 --build-arg base_img=${{matrix.config.base_image_repo}}:${{matrix.config.base_image_tag}}${BASE_TAG_SUFFIX} -t ${{matrix.config.image_name_base}}${TAG_SUFFIX}_test -f ${{matrix.config.dockerfile}} --push .
       elif [ ${{ github.event_name }} == 'workflow_dispatch' ]; then
          if [ "${{ matrix.config.base_image_repo }}" == "ubuntu" ]; then
             TAG_SUFFIX=""
             BASE_TAG_SUFFIX=""
          else
             TAG_SUFFIX="_stable"
             BASE_TAG_SUFFIX="_stable"
          fi
          echo "Building and pushing stable tour core image for amd64 and arm64"
          docker buildx build --platform linux/amd64,linux/arm64 --build-arg base_img=${{matrix.config.base_image_repo}}:${{matrix.config.base_image_tag}}${BASE_TAG_SUFFIX} -t ${{matrix.config.image_name_base}}${TAG_SUFFIX}_test -f ${{matrix.config.dockerfile}} --push .
       else
          echo "Failure!"
          exit 1
       fi
